# Example agent-audit preset: reproducibility audit of two recorded agent
# sessions — run manifests ("lockfile"), config drift diff, tool-call trace
# alignment (call_id-paired with exact/inferred quality, first behavioral
# divergence), symmetric multidimensional outcome diff (change recorded both
# directions + regression/improvement assessment), two-stage classed
# decision extraction with evidence, secret redaction.
# Payload: {"baseline": path, "candidate": path}; empty input uses the
# bundled fixtures. Run from the repository root:
#   THROUGHLINE_PRESETS=examples/presets PYTHONPATH=src:. python3 -m throughline run agent-audit -i "audit" --json --blame
name = "agent-audit"
description = "Agent workflow audit: manifest + trace + outcome fingerprint -> drift/divergence diff -> report, with secret redaction."

# Stage 2 of decision extraction. The default is a deterministic cue
# heuristic so the example runs offline; fill with an LLM-backed extractor
# in a real deployment, or with a `lambda s: None` to run markers-only.
[slots.semantic]
description = "sentence -> (class, cue) | None; classes: plan/decision/assumption/action"
default = "examples.agent_audit:heuristic_semantics"

# What the lineage ledger is allowed to record. Lineage's run-end sweep
# re-attributes the policy-egress redaction as an "egress" pseudo-step, but
# that fixes only the FINAL state — earlier ledger records keep the text
# captured at step end, so a trail that must never hold a secret scrubs at
# capture too.
[slots.lineage_extract]
description = "payload -> artifact the lineage ledger may record (scrub-at-capture)"
default = "examples.agent_audit:lineage_report"

[[steps]]
uses = "examples.agent_audit:normalize"
name = "normalize"

[[steps]]
uses = "examples.agent_audit:load_sessions"
name = "load"

[[steps]]
uses = "examples.agent_audit:build_manifests"
name = "manifests"

[[steps]]
uses = "examples.agent_audit:assess_outcomes"
name = "outcomes"

[[steps]]
uses = "examples.agent_audit:extract_traces"
name = "traces"

[[steps]]
uses = "examples.agent_audit:extract_decisions"
name = "decisions"
[steps.with]
semantic = "@semantic"

[[steps]]
uses = "examples.agent_audit:diff_runs"
name = "diff"

[[steps]]
uses = "examples.agent_audit:render_report"
name = "report"

# Table order is the middleware order: observers outside Policy (a redaction
# must be visible in metrics and events). Validate is outside Policy so final
# schema validation sees the redacted output. Lineage sits outside Policy so
# its run-end sweep can re-attribute the egress redaction; @lineage_extract
# additionally scrubs at capture so no ledger record ever holds the secret.
[middleware.observe]

[middleware.metrics]

[middleware.validate]
scope = "final"
on_fail = "raise"
[middleware.validate.schema]
type = "object"
required = ["verdict", "drift", "trace_quality", "trace_divergence", "divergence", "outcomes", "decisions", "report"]
[middleware.validate.schema.properties.verdict]
type = "string"
enum = ["clean", "config_drift", "execution_divergence", "drift_and_divergence"]
[middleware.validate.schema.properties.report]
type = "string"

[middleware.lineage]
extract = "@lineage_extract"

[middleware.policy]
egress = ["examples.agent_audit:redact_secrets"]
