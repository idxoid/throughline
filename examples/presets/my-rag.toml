# Example of a *user* preset extending the builtin demo:
# swaps retrieval depth, tightens validation, keeps the rest.
# Run from this directory:
#   THROUGHLINE_PRESETS=examples/presets PYTHONPATH=src python3 -m throughline run my-rag -i "what is a preset?"
name = "my-rag"
extends = "demo"
description = "Demo preset, but top_k=2 and strict validation."

[config]
top_k = 2

[middleware.validate]
on_fail = "raise"
[middleware.validate.schema]
type = "object"
required = ["question", "context", "answer"]
