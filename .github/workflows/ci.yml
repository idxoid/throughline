name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit & integration tests (stdlib only)
        run: python -m unittest discover -s tests
      - name: Offline end-to-end demo
        run: python examples/demo_rag.py
      - name: CLI smoke
        run: |
          python -m throughline run demo --input "ci smoke" --blame --metrics
          python -m throughline doctor demo
      - name: Agent lockfile verify
        run: |
          python -m throughline lockfile verify \
            -l examples/data/agent.lock.json \
            --config examples/data/agent.lock.json \
            --root . \
            --json
      - name: Agent preflight preset
        env:
          THROUGHLINE_PRESETS: examples/presets
        run: |
          python -m throughline run agent-preflight --json-input \
            -i "{\"harness_config\": $(cat examples/data/agent.lock.json)}" --json
      - name: Transcript convert smoke
        run: |
          python -m throughline transcript convert \
            -i tests/data/transcripts/codex_sample.jsonl \
            -o /tmp/codex.neutral.jsonl --json
